<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#01160d"/>
      <stop offset="0.55" stop-color="#032414"/>
      <stop offset="1" stop-color="#01160d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0" stop-color="#0c3d22" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#01160d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f5130"/>
      <stop offset="1" stop-color="#0a3a21"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#d8e0dc"/>
    </linearGradient>
    <pattern id="dots" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#1f7a47" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1600" height="800" fill="url(#bg)"/>
  <rect width="1600" height="800" fill="url(#dots)"/>
  <rect width="1600" height="800" fill="url(#glow)"/>

  <!-- scattered faint check marks -->
  <g stroke="#2f9d5b" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.12">
    <path d="M170 180 l34 34 l64 -76"/>
    <path d="M1360 150 l34 34 l64 -76"/>
    <path d="M120 620 l34 34 l64 -76"/>
    <path d="M1410 600 l34 34 l64 -76"/>
    <path d="M760 90 l34 34 l64 -76"/>
  </g>

  <!-- ballot box -->
  <g transform="translate(800 470)">
    <!-- ballot paper entering slot -->
    <g transform="translate(-95 -250) rotate(-8)">
      <rect x="0" y="0" width="190" height="240" rx="8" fill="url(#paper)"/>
      <rect x="22" y="28" width="120" height="12" rx="6" fill="#9aa6a0"/>
      <rect x="22" y="58" width="146" height="9" rx="4.5" fill="#c2ccc7"/>
      <rect x="22" y="80" width="120" height="9" rx="4.5" fill="#c2ccc7"/>
      <circle cx="40" cy="150" r="20" fill="none" stroke="#0f5130" stroke-width="5"/>
      <path d="M30 150 l9 10 l18 -22" fill="none" stroke="#16a34a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="74" y="140" width="92" height="11" rx="5.5" fill="#9aa6a0"/>
      <rect x="74" y="165" width="70" height="9" rx="4.5" fill="#c2ccc7"/>
    </g>

    <!-- box body -->
    <rect x="-180" y="-20" width="360" height="230" rx="14" fill="url(#box)" stroke="#15643b" stroke-width="3"/>
    <!-- lid -->
    <rect x="-205" y="-46" width="410" height="46" rx="12" fill="#0d4a2b" stroke="#15643b" stroke-width="3"/>
    <!-- slot -->
    <rect x="-70" y="-30" width="140" height="14" rx="7" fill="#01160d"/>
    <!-- front panel star emblem -->
    <circle cx="0" cy="105" r="52" fill="#01160d" opacity="0.35"/>
    <path d="M0 65 l13 27 l30 4 l-22 21 l5 30 l-26 -14 l-26 14 l5 -30 l-22 -21 l30 -4 z" fill="#facc15"/>
  </g>

  <!-- subtle ground shadow -->
  <ellipse cx="800" cy="700" rx="300" ry="34" fill="#000" opacity="0.35"/>
</svg>
